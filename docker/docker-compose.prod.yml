# ─────────────────────────────────────────────────────────────
# Production stack: PostGIS + FastAPI backend + Caddy (HTTPS).
#
# Designed for a single VM (Hetzner / DigitalOcean / EC2). Frontend
# is deployed separately to Vercel and points at this backend's
# public URL via NEXT_PUBLIC_API_URL.
#
# Quick start (on the VM):
#   1. Clone repo, cd into it
#   2. Create .env (copy .env.prod.example)
#   3. docker compose -f docker/docker-compose.prod.yml up -d postgis
#   4. Restore DB dump (see docs/DEPLOYMENT.md)
#   5. docker compose -f docker/docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: marine_risk_postgis_prod
    restart: unless-stopped
    shm_size: "2g"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marine_risk}
      POSTGRES_USER: ${POSTGRES_USER:-marine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "work_mem=128MB"
      - "-c"
      - "max_parallel_workers_per_gather=2"
      - "-c"
      - "random_page_cost=1.1"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      # Bind-mount the dump folder so we can pg_restore from the host.
      # Path is relative to this compose file (docker/), so go up one level.
      - ../db_dumps:/dumps:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marine}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mr_internal

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: marine_risk_backend:latest
    container_name: marine_risk_backend
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      # Database — DATABASE_URL takes precedence over MR_DB_*.
      DATABASE_URL: postgresql://${POSTGRES_USER:-marine}:${POSTGRES_PASSWORD}@postgis:5432/${POSTGRES_DB:-marine_risk}
      MR_DB_HOST: postgis
      MR_DB_PORT: "5432"
      MR_DB_NAME: ${POSTGRES_DB:-marine_risk}
      MR_DB_USER: ${POSTGRES_USER:-marine}
      MR_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Auth + CORS
      MR_JWT_SECRET: ${MR_JWT_SECRET:?MR_JWT_SECRET must be set}
      MR_JWT_EXPIRY_HOURS: "168"
      MR_CORS_ORIGINS: ${MR_CORS_ORIGINS:-https://marine-risk.vercel.app}
      PORT: "8000"
    volumes:
      # User-uploaded media (sighting photos, audio, avatars, event covers).
      # Bind-mounted from the host so we can rsync seed content in and so
      # uploads survive `docker compose down -v`.
      - ../data/uploads:/app/data/uploads
      # ML classifier artefacts (photo + audio). Rsync'd to the host via
      # scripts/upload_assets.sh; not baked into the image because they are
      # large + gitignored. Read-only — backend never writes to these.
      - ../data/processed/ml:/app/data/processed/ml:ro
    networks:
      - mr_internal
      - mr_public

  caddy:
    image: caddy:2-alpine
    container_name: marine_risk_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set, e.g. api.marinerisk.example}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Static assets (whale GLB models, species photos, wizard images) served
      # at /static/* under the API domain. Bind-mount the host's frontend
      # public folder read-only — same files Next.js dev serves locally.
      - ../frontend/public:/srv/static:ro
    depends_on:
      - backend
    networks:
      - mr_public

volumes:
  postgis_data:
  caddy_data:
  caddy_config:

networks:
  mr_internal:
    driver: bridge
  mr_public:
    driver: bridge
