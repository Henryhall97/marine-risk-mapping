# dbt project configuration
# This is the main config file that tells dbt where to find
# models, what database to target, and how to materialise results.

name: marine_risk
version: "1.0.0"
profile: marine_risk

# Where dbt looks for SQL models, tests, macros, etc.
model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
analysis-paths: ["analyses"]

# Compiled SQL and run artifacts go here (git-ignored)
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Default materialisation strategy per folder
# 'view' = CREATE VIEW (no data stored, always fresh)
# 'table' = CREATE TABLE (data stored, faster reads)
models:
  marine_risk:
    +materialized: view
    staging:
      +materialized: view
    intermediate:
      +materialized: table
    marts:
      +materialized: table

# Domain thresholds used across SQL models.
# Keep in sync with pipeline/config.py for values shared
# between Python and dbt (e.g. proximity decay, bathymetry).
vars:
  # Bathymetry classification (metres, negative = below sea level)
  shelf_depth_m: -200
  slope_depth_m: -1000
  # Cetacean analysis
  cetacean_recent_year: 2019
  # Proximity decay (λ = ln(2) / half-life-km)
  proximity_whale_lambda: 0.0693
  proximity_strike_lambda: 0.0277
  proximity_protection_lambda: 0.01386
  proximity_distance_cap_km: 700
  proximity_protection_cap_km: 1000
  # Vanderlaan & Taggart (2007) speed-lethality logistic
  vt_lethality_beta0: -4.89
  vt_lethality_beta1: 0.41
  # Spatial join tolerances (degrees)
  ocean_covariate_match_degrees: 0.3
  nisi_match_degrees: 1.0
  # Season definitions (meteorological, North Atlantic whale ecology)
  # Month lists for each season — used by seasonal intermediate models
  season_winter_months: [12, 1, 2]
  season_spring_months: [3, 4, 5]
  season_summer_months: [6, 7, 8]
  season_fall_months: [9, 10, 11]

  # ── Collision risk sub-score weights (must sum to 1.0) ──
  # Standard 7-sub-score model (fct_collision_risk, fct_collision_risk_seasonal)
  risk_weight_traffic: 0.25
  risk_weight_cetacean: 0.25
  risk_weight_proximity: 0.15
  risk_weight_strike: 0.10
  risk_weight_habitat: 0.10
  risk_weight_protection_gap: 0.10
  risk_weight_reference: 0.05

  # ML-enhanced 7-sub-score model (fct_collision_risk_ml)
  # No habitat sub-score — ISDM predictions already encode habitat
  # via the 7 environmental covariates they were trained on.
  risk_ml_weight_interaction: 0.30
  risk_ml_weight_traffic: 0.15
  risk_ml_weight_whale_ml: 0.15
  risk_ml_weight_proximity: 0.15
  risk_ml_weight_strike: 0.10
  risk_ml_weight_protection_gap: 0.10
  risk_ml_weight_reference: 0.05

  # Projected ML risk weights (climate projections, 6 sub-scores).
  # Proximity removed: whale-proximity component is stale under future
  # projections (measures distance to *current* sightings, not projected
  # habitat).  Remaining weights renormalized: w_i / (1 - 0.15).
  risk_ml_projected_weight_interaction: 0.3529
  risk_ml_projected_weight_traffic: 0.1765
  risk_ml_projected_weight_whale_ml: 0.1765
  risk_ml_projected_weight_strike: 0.1176
  risk_ml_projected_weight_protection_gap: 0.1176
  risk_ml_projected_weight_reference: 0.0588

  # Risk category thresholds (score >= threshold → label)
  risk_threshold_critical: 0.7
  risk_threshold_high: 0.5
  risk_threshold_medium: 0.35
  risk_threshold_low: 0.2

  # ── Sub-score internal weights (must each sum to 1.0) ───

  # Traffic threat (8 percentile components)
  traffic_w_speed_lethality: 0.20
  traffic_w_high_speed_fraction: 0.10
  traffic_w_vessels: 0.20
  traffic_w_large_vessels: 0.10
  traffic_w_draft_risk: 0.10
  traffic_w_draft_risk_fraction: 0.05
  traffic_w_commercial: 0.10
  traffic_w_night_traffic: 0.15

  # Cetacean exposure (3 components)
  cetacean_w_sightings: 0.35
  cetacean_w_baleen: 0.35
  cetacean_w_recent: 0.30

  # ML whale exposure (3 components — fct_collision_risk_ml only)
  whale_ml_w_any: 0.50
  whale_ml_w_max: 0.30
  whale_ml_w_mean: 0.20

  # Strike history (3 components)
  strike_w_total: 0.40
  strike_w_fatal: 0.35
  strike_w_baleen: 0.25

  # Habitat suitability — two-level weighting:
  #   Outer:  bathymetry (geomorphology) vs ocean (productivity)
  #   Inner:  shelf / edge / depth zone within the bathymetry component
  # TODO: revisit ocean weight — ISDM shows PP ranks 5th-6th (9-13%)
  #   across all 4 species.  See TODO.md for full rationale.
  habitat_w_bathymetry: 0.80
  habitat_w_ocean: 0.20
  habitat_w_shelf: 0.50
  habitat_w_edge: 0.30
  habitat_w_depth_zone: 0.20

  # Depth zone scores (used inside habitat sub-score)
  depth_zone_shelf: 1.0
  depth_zone_slope: 0.5
  depth_zone_abyssal: 0.1

  # Proximity blend (whale×ship, strike, protection gap)
  proximity_w_whale_ship: 0.45
  proximity_w_strike: 0.30
  proximity_w_protection: 0.25

  # Protection gap tiered scores (lower = better protected)
  # Proposed speed zones removed — they are not enforceable protection.
  # SMAs are voluntary speed advisories with limited enforcement,
  # so they provide a small bonus on top of MPA tiers but rank
  # far below real spatial exclusions when standing alone.
  protection_notake_and_sma: 0.10
  protection_notake_only: 0.15
  protection_strict_and_sma: 0.25
  protection_strict_mpa: 0.35
  protection_mpa_and_sma: 0.50
  protection_any_mpa: 0.60
  protection_sma_only: 0.80
  protection_none: 1.0

seeds:
  marine_risk:
    species_crosswalk:
      +column_types:
        is_baleen: boolean
        aphia_id: integer
