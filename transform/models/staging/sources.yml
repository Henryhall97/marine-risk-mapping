# Source definitions — tells dbt about tables that already
# exist in the database (loaded outside of dbt).
#
# Sources are referenced in models with:
#   {{ source('marine_risk', 'cetacean_sightings') }}
#
# This gives dbt lineage tracking — it knows which models
# depend on which raw tables.

version: 2

sources:
  - name: marine_risk
    schema: public
    description: "Raw data loaded into PostGIS by load_data.py"
    tables:
      - name: cetacean_sightings
        description: "Whale/dolphin observation records from OBIS"
        columns:
          - name: id
            description: "Auto-generated primary key"
          - name: scientific_name
            description: "Binomial or higher-level taxonomic name"
          - name: decimal_latitude
            description: "Latitude WGS-84"
          - name: decimal_longitude
            description: "Longitude WGS-84"
          - name: species
            description: "Species-level identification (nullable)"
          - name: geom
            description: "PostGIS POINT geometry (SRID 4326)"

      - name: marine_protected_areas
        description: "MPA boundaries from NOAA MPA Inventory"
        columns:
          - name: id
            description: "Auto-generated primary key"
          - name: site_id
            description: "NOAA site identifier"
          - name: site_name
            description: "Human-readable MPA name"
          - name: geom
            description: "PostGIS POLYGON/MULTIPOLYGON geometry (SRID 4326)"

      - name: ais_h3_summary
        description: >
          AIS vessel traffic aggregated to H3 resolution-7 hex cells
          (~1.2km) per month. Produced by pipeline/aggregation/aggregate_ais.py.
          Contains ~66 columns of ping-weighted and vessel-weighted metrics.
        columns:
          - name: h3_cell
            description: "H3 cell index (resolution 7, BIGINT)"
          - name: month
            description: "First day of the month (DATE)"
          - name: cell_lat
            description: "Centroid latitude of the H3 cell"
          - name: cell_lon
            description: "Centroid longitude of the H3 cell"

      - name: cetacean_sighting_h3
        description: >
          Mapping of cetacean sightings to H3 resolution-7 cells.
          Produced by pipeline/aggregation/assign_cetacean_h3.py
          using the Python h3 library for exact cell assignment.
        columns:
          - name: sighting_id
            description: "Foreign key to cetacean_sightings.id"
          - name: h3_cell
            description: "H3 cell index (resolution 7, BIGINT)"
          - name: cell_lat
            description: "Centroid latitude of the H3 cell"
          - name: cell_lon
            description: "Centroid longitude of the H3 cell"

      - name: bathymetry_h3
        description: >
          GEBCO bathymetry sampled at H3 resolution-7 cell centroids
          and vertices. Produced by pipeline/aggregation/sample_bathymetry.py.
          Mean of 7 sample points per cell (centroid + 6 hex vertices).
        columns:
          - name: h3_cell
            description: "H3 cell index (resolution 7, BIGINT)"
          - name: depth_m
            description: "Mean depth in metres (negative = below sea level)"
          - name: min_depth_m
            description: "Shallowest sample point depth"
          - name: max_depth_m
            description: "Deepest sample point depth"
          - name: depth_range_m
            description: "Depth range across sample points (shelf-edge indicator)"
          - name: sample_count
            description: "Number of valid sample points (max 7)"

      - name: cell_proximity
        description: >
          Nearest-neighbour distances between grid cells and key features.
          Produced by pipeline/aggregation/compute_proximity.py using
          scipy KDTree with haversine post-correction.
        columns:
          - name: h3_cell
            description: "H3 cell index (resolution 7, BIGINT)"
          - name: dist_to_nearest_whale_km
            description: "Haversine distance to nearest cetacean sighting cell (km)"
          - name: dist_to_nearest_ship_km
            description: "Haversine distance to nearest vessel traffic cell (km)"
          - name: dist_to_nearest_strike_km
            description: "Haversine distance to nearest historical ship strike cell (km)"
          - name: dist_to_nearest_protection_km
            description: "Haversine distance to nearest speed zone / SMA boundary (km)"

      - name: ship_strikes
        description: >
          Whale–vessel strike incident records parsed from NOAA
          Ship Strike Database PDFs. 261 records total, 67 geocoded.
        columns:
          - name: id
            description: "Auto-generated primary key"
          - name: incident_date
            description: "Date of the strike (text, may be partial)"
          - name: species
            description: "Whale species involved"
          - name: latitude
            description: "Latitude WGS-84 (nullable — 194 records ungeocoded)"
          - name: longitude
            description: "Longitude WGS-84 (nullable)"
          - name: region
            description: "Geographic region (e.g. US East Coast)"
          - name: mortality_injury
            description: "Outcome — mortality, serious injury, etc."
          - name: geom
            description: "PostGIS POINT geometry (SRID 4326, nullable)"

      - name: ship_strike_h3
        description: >
          Mapping of geocoded ship strikes to H3 resolution-7 cells.
          Produced by pipeline/aggregation/assign_ship_strike_h3.py.
          67 strikes with coordinates → 67 unique cells.
        columns:
          - name: strike_id
            description: "Foreign key to ship_strikes.id"
          - name: h3_cell
            description: "H3 cell index (resolution 7, BIGINT)"
          - name: cell_lat
            description: "Centroid latitude of the H3 cell"
          - name: cell_lon
            description: "Centroid longitude of the H3 cell"

      - name: right_whale_speed_zones
        description: >
          PROPOSED right whale seasonal speed zone polygons
          (5 zones). These are NOT the current active SMAs.
        columns:
          - name: id
            description: "Auto-generated primary key"
          - name: zone_name
            description: "Zone name"
          - name: start_month
            description: "Season start month (1-12)"
          - name: start_day
            description: "Season start day"
          - name: end_month
            description: "Season end month (1-12)"
          - name: end_day
            description: "Season end day"
          - name: geom
            description: "PostGIS POLYGON geometry (SRID 4326)"

      - name: seasonal_management_areas
        description: >
          Current active NARW Seasonal Management Areas from
          50 CFR § 224.105. 10 zones where vessels ≥65 ft must
          travel ≤10 knots during specified seasons. Downloaded
          from NOAA ArcGIS feature service.
        columns:
          - name: id
            description: "Auto-generated primary key"
          - name: zone_name
            description: "SMA zone name (e.g. Block Island, Cape Cod Bay)"
          - name: zone_abbr
            description: "Short abbreviation (e.g. BI, CCB, GSC)"
          - name: start_month
            description: "Season start month (1-12)"
          - name: start_day
            description: "Season start day"
          - name: end_month
            description: "Season end month (1-12)"
          - name: end_day
            description: "Season end day"
          - name: geom
            description: "PostGIS POLYGON geometry (SRID 4326)"

      - name: nisi_risk_grid
        description: >
          Nisi et al. (2024) global whale–ship collision risk grid.
          47,040 rows of 1-degree cells with risk scores for 4 species,
          management indicators, and hotspot classifications.
        columns:
          - name: x
            description: "Longitude of grid cell centre"
          - name: y
            description: "Latitude of grid cell centre"
          - name: all_risk
            description: "Combined risk score across all 4 species"
          - name: region
            description: "Ocean region classification"
          - name: geom
            description: "PostGIS POINT geometry (SRID 4326)"

      - name: ocean_covariates
        description: >
          Seasonal ocean environmental covariates for US coastal
          waters. SST, MLD, SLA, primary productivity — climatological
          means computed per season from 2019–2024 monthly data.
          Resolution: 0.25°, grain: (lat, lon, season).
        columns:
          - name: lat
            description: "Latitude WGS-84"
          - name: lon
            description: "Longitude WGS-84"
          - name: season
            description: "Season name: winter, spring, summer, fall"
          - name: sst
            description: "Sea surface temperature (°C)"
          - name: sst_sd
            description: "SST standard deviation (°C)"
          - name: mld
            description: "Mixed layer depth (m)"
          - name: sla
            description: "Sea level anomaly (m)"
          - name: pp_upper_200m
            description: "Primary productivity upper 200m (mg C/m²/day)"
          - name: geom
            description: "PostGIS POINT geometry (SRID 4326)"

      - name: ml_whale_predictions
        description: >
          ML-predicted whale presence probabilities per H3 cell per season.
          Produced by ISDM (Integrated Species Distribution Models) trained
          on Nisi et al. risk grid data and scored across the full H3 grid.
          Loaded by pipeline/database/load_ml_predictions.py from parquet
          files in data/processed/ml/isdm_predictions/.
          Grain: one row per (h3_cell, season). ~7.3M rows.
        columns:
          - name: h3_cell
            description: "H3 cell index (resolution 7, BIGINT)"
          - name: season
            description: "Season name: winter, spring, summer, fall"
          - name: isdm_blue_whale
            description: "Predicted P(blue whale present) from ISDM model (0–1)"
          - name: isdm_fin_whale
            description: "Predicted P(fin whale present) from ISDM model (0–1)"
          - name: isdm_humpback_whale
            description: "Predicted P(humpback whale present) from ISDM model (0–1)"
          - name: isdm_sperm_whale
            description: "Predicted P(sperm whale present) from ISDM model (0–1)"
