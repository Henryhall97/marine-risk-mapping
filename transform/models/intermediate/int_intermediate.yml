# Schema, tests, and documentation for the intermediate layer.
#
# These models prepare each domain (grid, traffic, cetaceans, MPAs)
# for the mart-layer risk model that joins them together.
#
# Convention: every column gets a description (data dictionary).
# Tests are applied selectively — join keys, not-null guarantees,
# and sanity checks that catch real data problems.

version: 2

models:
  # ── Hex Grid Spine ──────────────────────────────────────
  - name: int_hex_grid
    description: >
      Unique H3 resolution-7 hex cells with centroid point geometry.
      Spatial spine that cetacean and MPA models join against.
      ~1.9M rows (one per cell across the full AIS dataset).
    config:
      indexes:
        - columns: ['geom']
          type: gist
        - columns: ['h3_cell']
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7, BIGINT)"
        tests:
          - unique
          - not_null

      - name: cell_lat
        description: "Centroid latitude of the H3 cell (WGS-84)"
        tests:
          - not_null

      - name: cell_lon
        description: "Centroid longitude of the H3 cell (WGS-84)"
        tests:
          - not_null

      - name: geom
        description: "PostGIS POINT geometry (SRID 4326) at cell centroid"
        tests:
          - not_null

  # ── Vessel Traffic ──────────────────────────────────────
  - name: int_vessel_traffic
    description: >
      Vessel traffic metrics per H3 cell per month, sourced from
      the AIS H3 aggregation. Uses vessel-weighted (vw_) metrics
      to correct for AIS ping-rate bias where Class A ships
      broadcast 15x more than Class B. ~9.7M rows.
    config:
      indexes:
        - columns: ['h3_cell']
        - columns: ['month']
    columns:
      # ── Keys & spatial ─────────────────────────────
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: month
        description: "First day of the month (DATE)"
        tests:
          - not_null

      - name: cell_lat
        description: "Centroid latitude of the H3 cell"

      - name: cell_lon
        description: "Centroid longitude of the H3 cell"

      # ── Traffic volume ─────────────────────────────
      - name: ping_count
        description: "Total AIS pings received in this cell-month (raw, not debiased)"
        tests:
          - not_null

      - name: unique_vessels
        description: "Distinct MMSI count in this cell-month"
        tests:
          - not_null

      # ── Speed ──────────────────────────────────────
      - name: vw_avg_speed_knots
        description: "Vessel-weighted average speed in knots (debiased)"

      - name: vw_median_speed_knots
        description: "Vessel-weighted median speed in knots (robust to GPS glitches)"

      - name: max_speed_knots
        description: "Maximum observed speed across all pings in this cell-month"

      - name: high_speed_pings
        description: "Pings with SOG > 10 knots (strike-risk threshold)"

      - name: high_speed_vessel_count
        description: "Distinct vessels exceeding 10 knots at least once"

      # ── Vessel length ──────────────────────────────
      - name: vw_avg_length_m
        description: "Vessel-weighted average length in metres (debiased)"

      - name: max_length_m
        description: "Maximum reported vessel length in this cell-month"

      - name: p95_length_m
        description: "95th percentile vessel length (filters outliers)"

      - name: large_vessel_count
        description: "Vessels with length > 100m (ocean-going commercial)"

      - name: length_report_count
        description: "Vessels that reported a non-zero length value"

      # ── Vessel width ───────────────────────────────
      - name: vw_avg_width_m
        description: "Vessel-weighted average beam width in metres"

      - name: max_width_m
        description: "Maximum reported vessel width in this cell-month"

      - name: wide_vessel_count
        description: "Vessels with width > 20m (wide-beam commercial)"

      # ── Vessel draft ───────────────────────────────
      - name: vw_avg_draft_m
        description: "Vessel-weighted average draft in metres"

      - name: max_draft_m
        description: "Maximum reported draft in this cell-month"

      - name: p95_draft_m
        description: "95th percentile vessel draft"

      - name: deep_draft_count
        description: "Vessels with draft > 8m (deep-draft commercial)"

      - name: draft_report_count
        description: "Vessels that reported a non-zero draft value"

      # ── Course diversity ───────────────────────────
      - name: avg_circ_cog_stddev
        description: >
          Average within-vessel circular COG standard deviation (degrees).
          High value = vessels are maneuvering/turning frequently in this cell.
          Uses Yamartino method for proper circular statistics.

      - name: cross_vessel_circ_cog_stddev
        description: >
          Cross-vessel circular COG standard deviation (degrees).
          High value = vessels heading in many different directions (crossing traffic).
          Each vessel is normalised to a unit heading vector before averaging.

      - name: cog_vessel_count
        description: "Vessels that reported at least one valid COG value"

      # ── Day / Night ────────────────────────────────
      - name: day_unique_vessels
        description: "Distinct vessels observed during daytime (06:00–20:00 local solar)"

      - name: night_unique_vessels
        description: "Distinct vessels observed at night (before 06:00 or after 20:00 local solar)"

      - name: vw_day_avg_speed_knots
        description: "Vessel-weighted average speed during daytime"

      - name: vw_night_avg_speed_knots
        description: "Vessel-weighted average speed at night"

      - name: day_high_speed_vessel_count
        description: "Vessels exceeding 10 knots during daytime"

      - name: night_high_speed_vessel_count
        description: "Vessels exceeding 10 knots at night"

      # ── Vessel type mix ────────────────────────────
      - name: fishing_vessels
        description: "Distinct fishing vessels (AIS type 30, MarineCadastre 1001–1002)"

      - name: tug_vessels
        description: "Distinct tug/tow vessels (AIS types 31, 32, 52, MarineCadastre 1023, 1025)"

      - name: passenger_vessels
        description: "Distinct passenger vessels (AIS types 60–69, MarineCadastre 1012–1015)"

      - name: cargo_vessels
        description: "Distinct cargo vessels (AIS types 70–79, MarineCadastre 1003, 1004, 1016)"

      - name: tanker_vessels
        description: "Distinct tanker vessels (AIS types 80–89, MarineCadastre 1017, 1024)"

      - name: pleasure_vessels
        description: "Distinct pleasure/sailing craft (AIS types 36–37, MarineCadastre 1019)"

      - name: military_vessels
        description: "Distinct military vessels (AIS type 35, MarineCadastre 1021)"

      # ── Navigational status ────────────────────────
      - name: restricted_vessel_count
        description: >
          Vessels reporting restricted maneuverability (nav status 2 or 3).
          These vessels cannot avoid whale strikes even if detected.

      # ── Literature-based risk metrics ─────────────────
      - name: speed_lethality_index
        description: >
          Vanderlaan & Taggart (2007) speed-lethality logistic applied to
          vessel-weighted average speed: P(lethal|speed) = 1/(1+exp(-(β₀+β₁×v))).
          Continuous 0–1 metric replacing binary >10kn threshold. Approximation
          from cell-average speed; future AIS re-runs compute per-vessel.

      - name: high_speed_fraction
        description: >
          Fraction of unique vessels exceeding 10 knots (lethal speed threshold).
          Continuous 0–1 proportion vs. the raw count in high_speed_vessel_count.

      - name: draft_risk_fraction
        description: >
          Fraction of unique vessels with draft > 8m (deep-draft).
          Captures the vertical strike zone dimension from Rockwood et al. (2021).

      - name: draft_imputed_m
        description: >
          Cell-average draft with OLS imputation: where vw_avg_draft_m is NULL,
          estimated from vw_avg_length_m via regression (R²≈0.63, r=0.79).
          Clamped to [0.5, 25.0] metres. Provides continuous draft signal for
          cells where no vessel reported draft. Used for pctl_draft_risk scoring.

      - name: draft_was_imputed
        description: >
          True if draft_imputed_m was estimated from length regression
          rather than directly reported. ~6% of cell-months.

    tests:
      - unique:
          column_name: "h3_cell || '-' || month"

  # ── Cetacean Density ────────────────────────────────────
  - name: int_cetacean_density
    description: >
      Cetacean sighting counts per H3 cell. Each sighting is
      assigned to the nearest cell centroid within 660m (H3 res-7
      circumradius). Filtered to US coastal waters (lat 23–50,
      lon −131 to −64). One row per cell, time-aggregated.
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - unique
          - not_null

      - name: total_sightings
        description: "Total cetacean sightings matched to this cell"
        tests:
          - not_null

      - name: unique_species
        description: "Distinct species/taxon labels observed in this cell"
        tests:
          - not_null

      - name: species_level_sightings
        description: "Sightings identified to species level (highest taxonomic precision)"

      - name: recent_sightings
        description: "Sightings from 2019 onward (most relevant for current risk)"

      - name: baleen_whale_sightings
        description: >
          Sightings of baleen whales: Balaenopteridae (rorquals — blue,
          fin, humpback, minke), Balaenidae (right whales), and
          Eschrichtiidae (gray whale). These species are most vulnerable
          to vessel strikes due to their size, surface behaviour,
          and overlap with shipping lanes.

      - name: right_whale_sightings
        description: "Sightings of Eubalaena glacialis (North Atlantic right whale)"

      - name: humpback_sightings
        description: "Sightings of Megaptera novaeangliae (humpback whale)"

      - name: fin_whale_sightings
        description: "Sightings of Balaenoptera physalus (fin whale)"

      - name: blue_whale_sightings
        description: "Sightings of Balaenoptera musculus (blue whale)"

      - name: sperm_whale_sightings
        description: "Sightings of Physeter macrocephalus (sperm whale)"

      - name: minke_whale_sightings
        description: "Sightings of Balaenoptera acutorostrata (minke whale)"

      - name: earliest_year
        description: "Earliest observation year in this cell"

      - name: latest_year
        description: "Most recent observation year in this cell"

  # ── MPA Coverage ────────────────────────────────────────
  - name: int_mpa_coverage
    description: >
      Marine Protected Area overlap per H3 cell. Identifies which
      cells fall within MPA boundaries via ST_Intersects on cell
      centroid. Aggregated to one row per cell.
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - unique
          - not_null

      - name: mpa_count
        description: "Number of distinct MPAs whose boundary contains this cell centroid"
        tests:
          - not_null

      - name: mpa_names
        description: "Semicolon-separated list of overlapping MPA names (for debugging)"

      - name: has_strict_protection
        description: "True if any overlapping MPA has IUCN category Ia, Ib, II, or III"
        tests:
          - not_null

      - name: has_no_take_zone
        description: "True if any overlapping MPA has protection level No Take, No Access, or No Impact"
        tests:
          - not_null

  # ── Bathymetry ─────────────────────────────────────────
  - name: int_bathymetry
    description: >
      Ocean depth per H3 cell from GEBCO 2025. Averaged across
      7 sample points (centroid + 6 hex vertices) to capture
      shelf-edge gradients. Includes derived depth zone
      classification and continental shelf flag.
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - unique
          - not_null

      - name: depth_m
        description: "Mean depth in metres (negative = below sea level, positive = land)"
        tests:
          - not_null

      - name: min_depth_m
        description: "Shallowest depth across the 7 sample points"

      - name: max_depth_m
        description: "Deepest depth across the 7 sample points"

      - name: depth_range_m
        description: "Depth range across sample points — large values indicate shelf edge"

      - name: sample_count
        description: "Number of valid raster samples (max 7, fewer at raster edges)"

      - name: is_land
        description: "True if mean depth >= 0m (GEBCO positive = above sea level). Legacy — prefer is_ocean."
        tests:
          - not_null

      - name: is_ocean
        description: >
          True if cell centroid falls within a Natural Earth ocean polygon.
          Correctly excludes Great Lakes and inland water bodies that have
          negative GEBCO depth. Authoritative ocean/land classification.
        tests:
          - not_null

      - name: is_continental_shelf
        description: "True if mean depth between -200m and 0m (excludes land). Primary whale feeding habitat."
        tests:
          - not_null

      - name: is_shelf_edge
        description: "True if sample points straddle the -200m contour (upwelling zone)"
        tests:
          - not_null

      - name: depth_zone
        description: "Categorical: land / shelf / slope / abyssal"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['land', 'shelf', 'slope', 'abyssal']

  # ── Proximity ──────────────────────────────────────────
  - name: int_proximity
    description: >
      Nearest-neighbour distances from each grid cell to key
      spatial features: cetacean sightings, vessel traffic,
      historical ship strikes, and speed management zones.
      Pre-computed via scipy KDTree (compute_proximity.py)
      with haversine post-correction. Includes exponential
      decay proximity scores for the risk model.
      One row per h3_cell.
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - unique
          - not_null

      - name: dist_to_nearest_whale_km
        description: "Haversine distance to nearest cetacean sighting cell (km)"
        tests:
          - not_null

      - name: dist_to_nearest_ship_km
        description: "Haversine distance to nearest vessel traffic cell (km)"
        tests:
          - not_null

      - name: dist_to_nearest_strike_km
        description: "Haversine distance to nearest historical ship strike cell (km)"
        tests:
          - not_null

      - name: dist_to_nearest_protection_km
        description: "Haversine distance to nearest SMA / speed zone boundary (km)"
        tests:
          - not_null

      - name: whale_proximity_score
        description: "Exponential decay score (0–1) for whale proximity. Half-life = 10km."
        tests:
          - not_null

      - name: ship_proximity_score
        description: "Exponential decay score (0–1) for ship proximity. Half-life = 10km."
        tests:
          - not_null

      - name: strike_proximity_score
        description: "Exponential decay score (0–1) for strike proximity. Half-life = 25km."
        tests:
          - not_null

      - name: protection_proximity_score
        description: "Exponential decay score (0–1) for protection zone proximity. Half-life = 50km."
        tests:
          - not_null

  # ── Ship Strike Density ─────────────────────────────────
  - name: int_ship_strike_density
    description: >
      Ship strike counts per H3 cell, aggregated from the 67
      geocoded ship strike records. Includes breakdowns by
      outcome severity and species group.
      One row per h3_cell (only cells with strikes).
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - unique
          - not_null

      - name: total_strikes
        description: "Total ship strikes recorded in this cell"
        tests:
          - not_null

      - name: fatal_strikes
        description: "Number of fatal strikes in this cell"

      - name: baleen_strikes
        description: "Number of strikes involving baleen whales"

      - name: right_whale_strikes
        description: "Number of strikes involving North Atlantic right whales"

  # ── Speed Zone Coverage ─────────────────────────────────
  - name: int_speed_zone_coverage
    description: >
      Speed management zone coverage per H3 cell. Identifies which
      cells overlap current SMAs vs proposed NARW speed zones.
      Only cells inside at least one zone are included.
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - unique
          - not_null

      - name: in_speed_zone
        description: "Always true (only zone-overlapping cells are in this table)"
        tests:
          - not_null

      - name: in_current_sma
        description: "True if cell overlaps an active Seasonal Management Area"
        tests:
          - not_null

      - name: in_proposed_zone
        description: "True if cell overlaps a proposed NARW speed zone"
        tests:
          - not_null

      - name: zone_count
        description: "Number of overlapping speed management zones"

      - name: max_season_days
        description: "Maximum duration of speed restriction (days)"

  # ── Nisi Reference Risk ─────────────────────────────────
  - name: int_nisi_reference_risk
    description: >
      Nisi et al. (2024) published risk scores spatially joined
      to H3 cells via nearest-neighbour matching (within 1°).
      Serves as an external benchmark for our risk model.
      One row per h3_cell.
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - unique
          - not_null

      - name: nisi_all_risk
        description: "Nisi overall collision risk score (nullable — not all matched grid points have risk data)"

      - name: nisi_shipping_index
        description: "Nisi shipping intensity index (threat proxy)"

      - name: nisi_whale_space_use
        description: "Nisi whale space-use metric (vulnerability proxy)"

      - name: nisi_hotspot_overlap
        description: "Count of species-level hotspots overlapping this Nisi cell"

      - name: nisi_dist_km
        description: "Distance (km) from H3 centroid to nearest Nisi grid centre"

  # ── Ocean Covariates ────────────────────────────────────
  - name: int_ocean_covariates
    description: >
      Ocean environmental covariates spatially joined to H3 cells
      via nearest-neighbour matching (within 0.3°). Includes SST,
      mixed layer depth, sea level anomaly, and primary production.
      One row per h3_cell.
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - unique
          - not_null

      - name: sst
        description: "Sea surface temperature (°C)"

      - name: sst_sd
        description: "Sea surface temperature standard deviation (°C)"

      - name: mld
        description: "Mixed layer depth (m)"

      - name: sla
        description: "Sea level anomaly (m)"

      - name: pp_upper_200m
        description: "Primary production in upper 200m (mg C m⁻² day⁻¹)"

      - name: covariate_dist_km
        description: "Distance (km) from H3 centroid to nearest covariate grid point"

  # ── Ocean Covariates Seasonal ───────────────────────────
  - name: int_ocean_covariates_seasonal
    description: >
      Seasonal ocean environmental covariates spatially joined to H3
      cells via nearest-neighbour matching (within 0.3°). Each cell
      gets 4 rows — one per season — with climatological seasonal
      means of SST, MLD, SLA, and primary production (2019–2024).
      Grain: one row per (h3_cell, season).
    config:
      indexes:
        - columns: ['h3_cell', 'season']
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: season
        description: "Season name: winter, spring, summer, fall"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winter', 'spring', 'summer', 'fall']

      - name: sst
        description: "Seasonal mean sea surface temperature (°C)"

      - name: sst_sd
        description: "Seasonal mean SST standard deviation (°C)"

      - name: mld
        description: "Seasonal mean mixed layer depth (m)"

      - name: sla
        description: "Seasonal mean sea level anomaly (m)"

      - name: pp_upper_200m
        description: "Seasonal mean primary production in upper 200m (mg C m⁻² day⁻¹)"

      - name: covariate_dist_km
        description: "Distance (km) from H3 centroid to nearest covariate grid point"

    tests:
      - unique:
          column_name: "h3_cell || '-' || season"

  # ── Vessel Traffic Seasonal ─────────────────────────────
  - name: int_vessel_traffic_seasonal
    description: >
      Vessel traffic metrics per H3 cell per season, aggregated from
      the monthly int_vessel_traffic. Same metrics but at (h3_cell, season)
      grain instead of (h3_cell, month).
    config:
      indexes:
        - columns: ['h3_cell', 'season']
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: season
        description: "Season name: winter, spring, summer, fall"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winter', 'spring', 'summer', 'fall']

      - name: months_active
        description: "Number of distinct months with traffic in this season (max 3)"

      - name: total_pings
        description: "Total AIS pings in this cell-season"

      - name: avg_monthly_vessels
        description: "Average unique vessels per month within this season"

      - name: peak_monthly_vessels
        description: "Peak monthly vessel count within this season"

      - name: avg_speed_knots
        description: "Vessel-weighted average speed across this season (knots)"

      - name: peak_speed_knots
        description: "Maximum observed speed in this season (knots)"

      - name: avg_high_speed_vessels
        description: "Average high-speed vessels per month in this season"

      - name: total_high_speed_pings
        description: "Total pings above 10 knots across this season"

      - name: avg_large_vessels
        description: "Average large vessels (>100m) per month in this season"

      - name: avg_vessel_length_m
        description: "Average vessel-weighted length across this season (metres)"

      - name: avg_deep_draft_vessels
        description: "Average deep-draft vessels per month in this season"

      - name: avg_cog_diversity
        description: "Average cross-vessel COG stddev across this season"

      - name: avg_night_vessels
        description: "Average night-time vessels per month in this season"

      - name: avg_night_high_speed
        description: "Average night high-speed vessels per month in this season"

      - name: night_traffic_ratio
        description: "Average proportion of night traffic in this season"

      - name: avg_commercial_vessels
        description: "Average cargo + tanker vessels per month in this season"

      - name: avg_fishing_vessels
        description: "Average fishing vessels per month in this season"

      - name: avg_passenger_vessels
        description: "Average passenger vessels per month in this season"

      - name: avg_speed_lethality
        description: >
          Average Vanderlaan & Taggart (2007) speed-lethality index across
          months in this season. Continuous 0–1 metric replacing binary >10kn.

      - name: avg_high_speed_fraction
        description: >
          Average fraction of vessels at lethal speeds (≥10 kn) per month
          in this season.

      - name: avg_draft_risk_fraction
        description: >
          Average fraction of deep-draft vessels (>8m) per month
          in this season. Captures vertical strike zone dimension.

      - name: avg_draft_imputed_m
        description: >
          Average imputed cell-level draft across months in this season.
          Uses OLS regression from length where original draft was missing.
          Provides continuous draft signal for downstream risk scoring.

    tests:
      - unique:
          column_name: "h3_cell || '-' || season"

  # ── Cetacean Density Seasonal ───────────────────────────
  - name: int_cetacean_density_seasonal
    description: >
      Cetacean sighting counts per H3 cell per season. Sightings
      are assigned to seasons based on the observation month
      extracted from event_date. Only sightings with valid ISO
      dates are included (~95% of records).
    config:
      indexes:
        - columns: ['h3_cell', 'season']
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: season
        description: "Season name: winter, spring, summer, fall"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winter', 'spring', 'summer', 'fall']

      - name: total_sightings
        description: "Total cetacean sightings in this cell-season"
        tests:
          - not_null

      - name: unique_species
        description: "Distinct species/taxon labels in this cell-season"
        tests:
          - not_null

      - name: species_level_sightings
        description: "Sightings identified to species level"

      - name: recent_sightings
        description: "Sightings from 2019 onward"

      - name: baleen_whale_sightings
        description: "Sightings of baleen whales (Balaenopteridae, Balaenidae, Eschrichtiidae)"

      - name: right_whale_sightings
        description: "Sightings of Eubalaena glacialis (North Atlantic right whale) in this cell-season"

      - name: humpback_sightings
        description: "Sightings of Megaptera novaeangliae (humpback whale) in this cell-season"

      - name: fin_whale_sightings
        description: "Sightings of Balaenoptera physalus (fin whale) in this cell-season"

      - name: blue_whale_sightings
        description: "Sightings of Balaenoptera musculus (blue whale) in this cell-season"

      - name: sperm_whale_sightings
        description: "Sightings of Physeter macrocephalus (sperm whale) in this cell-season"

      - name: minke_whale_sightings
        description: "Sightings of Balaenoptera acutorostrata (minke whale) in this cell-season"

      - name: earliest_year
        description: "Earliest observation year in this cell-season"

      - name: latest_year
        description: "Most recent observation year in this cell-season"

    tests:
      - unique:
          column_name: "h3_cell || '-' || season"

  # ── Speed Zone Coverage Seasonal ────────────────────────
  - name: int_speed_zone_coverage_seasonal
    description: >
      Speed zone coverage per H3 cell per season. Determines which
      zones are ACTIVE during each season based on start/end month
      ranges. Handles year-wrapping zones (e.g., Nov–Apr).
      Only cell-seasons with at least one active zone are included.
    config:
      indexes:
        - columns: ['h3_cell', 'season']
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: season
        description: "Season name: winter, spring, summer, fall"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winter', 'spring', 'summer', 'fall']

      - name: in_speed_zone
        description: "Always true (only active cell-seasons are included)"
        tests:
          - not_null

      - name: in_current_sma
        description: "True if an active SMA overlaps this cell in this season"
        tests:
          - not_null

      - name: in_proposed_zone
        description: "True if a proposed zone overlaps this cell in this season"
        tests:
          - not_null

      - name: zone_count
        description: "Number of active speed zones in this cell-season"

      - name: current_sma_count
        description: "Number of active SMAs in this cell-season"

      - name: max_season_days
        description: "Maximum speed restriction duration among active zones (days)"

      - name: zone_names
        description: "Semicolon-separated list of active zone names and types"

    tests:
      - unique:
          column_name: "h3_cell || '-' || season"
  # ── ML Whale Predictions ────────────────────────────────
  - name: int_ml_whale_predictions
    description: >
      ISDM (Integrated Species Distribution Model) predictions of whale
      presence probability per H3 cell per season. Four species models
      (blue, fin, humpback, sperm whale) trained on Nisi et al. risk grid
      data, scored across the full H3 grid. Includes composite probabilities:
      max (highest single species), mean (average across species), and
      any (probability at least one species present via independence assumption).
      Grain: one row per (h3_cell, season). ~7.3M rows.
    config:
      indexes:
        - columns: ['h3_cell', 'season']
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: season
        description: "Season name: winter, spring, summer, fall"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winter', 'spring', 'summer', 'fall']

      - name: isdm_blue_whale
        description: "Predicted P(blue whale present) from ISDM model (0–1)"

      - name: isdm_fin_whale
        description: "Predicted P(fin whale present) from ISDM model (0–1)"

      - name: isdm_humpback_whale
        description: "Predicted P(humpback whale present) from ISDM model (0–1)"

      - name: isdm_sperm_whale
        description: "Predicted P(sperm whale present) from ISDM model (0–1)"

      - name: max_whale_prob
        description: "Highest P(present) across all 4 species"

      - name: mean_whale_prob
        description: "Average P(present) across all 4 species"

      - name: any_whale_prob
        description: "P(any whale present) = 1 - ∏(1 - P_i), independence assumption"

    tests:
      - unique:
          column_name: "h3_cell || '-' || season"

  # ── SDM (OBIS) Whale Predictions ────────────────────────
  - name: int_sdm_whale_predictions
    description: >
      SDM (OBIS-trained) whale presence predictions per H3 cell per season.
      Out-of-fold predictions from 5-fold spatial block CV — each cell's
      probability comes from a model that never saw it during training.
      Includes a directly trained any_whale aggregate plus 4 per-species
      models and computed composites (max, mean, joint probability).
      Enables direct comparison with ISDM (Nisi-trained) predictions.
      Grain: one row per (h3_cell, season). ~7.3M rows.
    config:
      indexes:
        - columns: ['h3_cell', 'season']
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: season
        description: "Season name: winter, spring, summer, fall"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winter', 'spring', 'summer', 'fall']

      - name: sdm_any_whale
        description: "Directly trained P(any whale present) from OBIS SDM (0–1)"

      - name: sdm_blue_whale
        description: "Predicted P(blue whale present) from OBIS SDM (0–1)"

      - name: sdm_fin_whale
        description: "Predicted P(fin whale present) from OBIS SDM (0–1)"

      - name: sdm_humpback_whale
        description: "Predicted P(humpback whale present) from OBIS SDM (0–1)"

      - name: sdm_sperm_whale
        description: "Predicted P(sperm whale present) from OBIS SDM (0–1)"

      - name: max_whale_prob
        description: "Highest P(present) across 4 per-species SDM models"

      - name: mean_whale_prob
        description: "Average P(present) across 4 per-species SDM models"

      - name: any_whale_prob_joint
        description: "P(any whale) = 1 - ∏(1 - P_i), independence assumption across 4 species"

    tests:
      - unique:
          column_name: "h3_cell || '-' || season"
