# Schema, tests, and documentation for the mart layer.
#
# These models are the final output of the dbt pipeline —
# consumed by the FastAPI backend and rendered by the
# Next.js + Deck.gl frontend.
#
# Convention: fct_ = fact table (metrics + measures at a grain).

version: 2

models:
  # ── Collision Risk ──────────────────────────────────────
  - name: fct_collision_risk
    description: >
      Whale–vessel collision risk per H3 cell. Joins vessel traffic
      (time-aggregated), cetacean sighting density, ocean depth,
      MPA coverage, whale–ship proximity, strike history, speed zones,
      Nisi reference risk, and ocean covariates into a single feature
      matrix. A composite risk score (0–1) is computed from
      percentile-ranked features weighted across seven sub-scores:
      traffic threat (25%), cetacean exposure (25%), proximity (15%),
      strike history (10%), habitat suitability (10%), protection
      gap (10%), and reference risk (5%).
      Land cells are excluded. One row per h3_cell.
    config:
      indexes:
        - columns: ['h3_cell']
        - columns: ['risk_score']
        - columns: ['geom']
          type: gist
    columns:
      # ── Keys & spatial ─────────────────────────────
      - name: h3_cell
        description: "H3 cell index (resolution 7, BIGINT)"
        tests:
          - unique
          - not_null

      - name: cell_lat
        description: "Centroid latitude of the H3 cell (WGS-84)"
        tests:
          - not_null

      - name: cell_lon
        description: "Centroid longitude of the H3 cell (WGS-84)"
        tests:
          - not_null

      - name: geom
        description: "PostGIS POINT geometry (SRID 4326) at cell centroid"
        tests:
          - not_null

      # ── Risk score ─────────────────────────────────
      - name: risk_score
        description: >
          Composite collision risk on a 0–1 scale (higher = more dangerous).
          Weighted sum of seven sub-scores: traffic_score (25%),
          cetacean_score (25%), proximity_score (15%), strike_score (10%),
          habitat_score (10%), protection_gap (10%), reference_risk_score (5%).
        tests:
          - not_null

      - name: risk_category
        description: >
          Human-readable risk bucket based on score thresholds:
          critical (≥0.7), high (≥0.5), medium (≥0.35),
          low (≥0.2), minimal (<0.2).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['critical', 'high', 'medium', 'low', 'minimal']

      # ── Sub-scores ─────────────────────────────────
      - name: traffic_score
        description: >
          Traffic threat sub-score (0–1). Weighted combination of
          percentile-ranked vessel density (35%), high-speed vessels (25%),
          large vessels (20%), commercial vessels (10%), and
          night traffic (10%). Weight in composite: 30%.
        tests:
          - not_null

      - name: cetacean_score
        description: >
          Cetacean exposure sub-score (0–1). Weighted combination of
          percentile-ranked total sightings (35%), baleen whale
          sightings (35%), and recent sightings (30%).
          Weight in composite: 30%.
        tests:
          - not_null

      - name: proximity_score
        description: >
          Proximity sub-score (0–1). Geometric mean of whale and
          ship exponential decay proximity scores (10km half-life).
          High only when whales and ships are co-located.
          Weight in composite: 20%.
        tests:
          - not_null

      - name: habitat_score
        description: >
          Habitat suitability sub-score (0–1). Continental shelf (50%),
          shelf edge (30%), and depth zone weight (20%). Higher on the
          continental shelf where whales feed.
          Weight in composite: 10%.
        tests:
          - not_null

      - name: protection_gap
        description: >
          Protection gap sub-score (0–1). Higher = less protected.
          No-take MPA = 0.2, strict IUCN MPA = 0.4, any MPA = 0.7,
          no MPA = 1.0. Weight in composite: 10%.
        tests:
          - not_null

      # ── Feature flags ──────────────────────────────
      - name: has_traffic
        description: "True if at least one month of vessel traffic exists in this cell"

      - name: has_whale_sightings
        description: "True if at least one cetacean sighting exists in this cell"

      - name: in_mpa
        description: "True if cell centroid falls within any Marine Protected Area"

      # ── Traffic features ───────────────────────────
      - name: months_active
        description: "Number of distinct months with vessel traffic (1–12)"

      - name: total_pings
        description: "Total AIS pings across all months"

      - name: avg_monthly_vessels
        description: "Average number of unique vessels per active month"

      - name: peak_monthly_vessels
        description: "Highest unique vessel count in any single month"

      - name: avg_speed_knots
        description: "Vessel-weighted average speed across all months (knots)"

      - name: peak_speed_knots
        description: "Maximum observed speed across all months (knots)"

      - name: avg_high_speed_vessels
        description: "Average count of vessels exceeding 10 knots per month"

      - name: total_high_speed_pings
        description: "Total AIS pings above 10 knots across all months"

      - name: avg_large_vessels
        description: "Average count of vessels > 100m per month"

      - name: avg_vessel_length_m
        description: "Average vessel-weighted length in metres across months"

      - name: avg_deep_draft_vessels
        description: "Average count of vessels with draft > 8m per month"

      - name: avg_cog_diversity
        description: "Average cross-vessel COG standard deviation (degrees) — higher = more crossing traffic"

      - name: avg_night_vessels
        description: "Average unique vessels at night (before 06:00 / after 20:00 local solar)"

      - name: avg_night_high_speed
        description: "Average high-speed vessels at night per month"

      - name: night_traffic_ratio
        description: "Proportion of traffic occurring at night (0–1)"

      - name: avg_commercial_vessels
        description: "Average combined cargo + tanker vessels per month"

      - name: avg_fishing_vessels
        description: "Average fishing vessels per month"

      - name: avg_passenger_vessels
        description: "Average passenger vessels per month"

      # ── Cetacean features ──────────────────────────
      - name: total_sightings
        description: "Total cetacean sightings in this cell (all years)"

      - name: unique_species
        description: "Distinct species/taxon labels observed"

      - name: species_level_sightings
        description: "Sightings identified to species level"

      - name: recent_sightings
        description: "Sightings from 2019 onward"

      - name: baleen_whale_sightings
        description: "Sightings of baleen whales (rorquals, right whales, gray whale)"

      - name: sighting_earliest_year
        description: "Earliest observation year in this cell"

      - name: sighting_latest_year
        description: "Most recent observation year in this cell"

      # ── Bathymetry features ────────────────────────
      - name: depth_m
        description: "Mean ocean depth in metres (negative = below sea level)"

      - name: depth_range_m
        description: "Depth range across sample points — large values = shelf edge"

      - name: is_continental_shelf
        description: "True if mean depth between -200m and 0m"

      - name: is_shelf_edge
        description: "True if sample points straddle the -200m contour"

      - name: depth_zone
        description: "Categorical: shelf / slope / abyssal (land excluded)"

      # ── MPA features ───────────────────────────────
      - name: mpa_count
        description: "Number of overlapping MPAs (null if no overlap)"

      - name: has_strict_protection
        description: "True if any overlapping MPA has IUCN category Ia–III"

      - name: has_no_take_zone
        description: "True if any overlapping MPA has No Take / No Access / No Impact"

      # ── Proximity features ─────────────────────────
      - name: dist_to_nearest_whale_km
        description: "Haversine distance to nearest cetacean sighting cell (km)"

      - name: dist_to_nearest_ship_km
        description: "Haversine distance to nearest vessel traffic cell (km)"


  # ── Monthly Traffic ─────────────────────────────────────
  - name: fct_monthly_traffic
    description: >
      Monthly vessel traffic per H3 cell enriched with static
      cell-level context (depth, whale sightings, MPA status).
      Powers temporal drill-down charts in the API.
      Land cells excluded. One row per (h3_cell, month).
    config:
      indexes:
        - columns: ['h3_cell']
        - columns: ['month']
        - columns: ['h3_cell', 'month']
          unique: true
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: month
        description: "First day of the month (DATE)"
        tests:
          - not_null

      - name: cell_lat
        description: "Centroid latitude of the H3 cell"

      - name: cell_lon
        description: "Centroid longitude of the H3 cell"

      # ── Traffic metrics ────────────────────────────
      - name: unique_vessels
        description: "Distinct vessels in this cell-month"
        tests:
          - not_null

      - name: ping_count
        description: "Total AIS pings in this cell-month"
        tests:
          - not_null

      - name: vw_avg_speed_knots
        description: "Vessel-weighted average speed (knots)"

      - name: vw_median_speed_knots
        description: "Vessel-weighted median speed (knots)"

      - name: max_speed_knots
        description: "Maximum observed speed (knots)"

      - name: high_speed_vessel_count
        description: "Vessels exceeding 10 knots"

      - name: large_vessel_count
        description: "Vessels > 100m length"

      - name: day_unique_vessels
        description: "Distinct vessels during daytime"

      - name: night_unique_vessels
        description: "Distinct vessels at night"

      - name: cargo_vessels
        description: "Distinct cargo vessels"

      - name: tanker_vessels
        description: "Distinct tanker vessels"

      - name: fishing_vessels
        description: "Distinct fishing vessels"

      - name: passenger_vessels
        description: "Distinct passenger vessels"

      - name: pleasure_vessels
        description: "Distinct pleasure/sailing craft"

      # ── Cell context (denormalised) ────────────────
      - name: depth_zone
        description: "Depth zone of this cell (shelf/slope/abyssal/unknown)"

      - name: is_continental_shelf
        description: "True if cell is on the continental shelf"

      - name: depth_m
        description: "Mean ocean depth in metres"

      - name: total_sightings
        description: "Total cetacean sightings in this cell (all years, 0 if none)"

      - name: baleen_whale_sightings
        description: "Baleen whale sightings in this cell (0 if none)"

      - name: in_mpa
        description: "True if cell is within any MPA"

  # ── Whale SDM Training ─────────────────────────────────
  - name: fct_whale_sdm_training
    description: >
      Species distribution model training set. One row per H3 cell
      with a binary whale_present target (1/0) plus environmental
      and spatial features for training presence/absence classifiers
      or MaxEnt-style models. Land cells excluded.
    config:
      indexes:
        - columns: ['h3_cell']
        - columns: ['geom']
          type: gist
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - unique
          - not_null

      - name: whale_present
        description: "Binary target: 1 = cetacean sighted in cell, 0 = no sightings"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]

      - name: total_sightings
        description: "Total cetacean sightings in this cell (0 for absence cells)"

      - name: right_whale_present
        description: "Binary target: 1 = North Atlantic right whale sighted, 0 = not sighted"

      - name: humpback_present
        description: "Binary target: 1 = humpback whale sighted, 0 = not sighted"

      - name: fin_whale_present
        description: "Binary target: 1 = fin whale sighted, 0 = not sighted"

      - name: blue_whale_present
        description: "Binary target: 1 = blue whale sighted, 0 = not sighted"

      - name: sperm_whale_present
        description: "Binary target: 1 = sperm whale sighted, 0 = not sighted"

      - name: minke_whale_present
        description: "Binary target: 1 = minke whale sighted, 0 = not sighted"

      - name: sst
        description: "Sea surface temperature (°C)"

      - name: mld
        description: "Mixed layer depth (m)"

      - name: depth_m
        description: "Mean ocean depth (m)"

      - name: is_continental_shelf
        description: "True if cell is on the continental shelf"

  # ── Strike Risk Training ────────────────────────────────
  - name: fct_strike_risk_training
    description: >
      Ship strike prediction training set. One row per H3 cell with
      strike count targets (has_strike, total_strikes) plus all
      spatial, traffic, cetacean, and environmental features. Suitable
      for binary classification, count regression, or zero-inflated
      models. Land cells excluded.
    config:
      indexes:
        - columns: ['h3_cell']
        - columns: ['geom']
          type: gist
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - unique
          - not_null

      - name: has_strike
        description: "Binary target: 1 = at least one historical strike, 0 = none"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]

      - name: total_strikes
        description: "Count target: total historical strikes in this cell"
        tests:
          - not_null

      - name: avg_monthly_vessels
        description: "Average monthly vessel count (key predictor)"

      - name: avg_speed_knots
        description: "Average vessel speed in knots"

      - name: in_speed_zone
        description: "True if cell is within a speed management zone"

  # ── Species Risk ────────────────────────────────────────
  - name: fct_species_risk
    description: >
      Species-level collision risk assessment. One row per
      (h3_cell, species_group) combination where that species
      has been sighted. Includes traffic exposure, strike history,
      protection status, and species-specific Nisi reference risk.
      Useful for species-specific risk maps and ESA consultations.
    config:
      indexes:
        - columns: ['h3_cell']
        - columns: ['species_group']
        - columns: ['geom']
          type: gist
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: species_group
        description: "Classified species group (right_whale, humpback, fin_whale, etc.)"
        tests:
          - not_null

      - name: species
        description: "Original species name from sighting record"
        tests:
          - not_null

      - name: sighting_count
        description: "Number of sightings of this species in this cell"
        tests:
          - not_null

      - name: species_risk_score
        description: "Simple species-level risk indicator (0–1) combining sighting density, traffic exposure, and protection status"

  # ── Collision Risk Seasonal ─────────────────────────────
  - name: fct_collision_risk_seasonal
    description: >
      Seasonal whale–vessel collision risk per H3 cell. Same 7-sub-score
      architecture as fct_collision_risk but at (h3_cell, season) grain.
      Seasonal inputs: traffic (int_vessel_traffic_seasonal), cetacean
      density (int_cetacean_density_seasonal), speed zones
      (int_speed_zone_coverage_seasonal). Static inputs reused across
      seasons: bathymetry, proximity, strike history, MPA, Nisi, ocean
      covariates. Percentile ranking is done WITHIN each season.
      Land cells excluded. ~7.2M rows.
    config:
      indexes:
        - columns: ['h3_cell', 'season']
        - columns: ['risk_score']
        - columns: ['geom']
          type: gist
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: season
        description: "Season name: winter, spring, summer, fall"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winter', 'spring', 'summer', 'fall']

      - name: cell_lat
        description: "Centroid latitude"
        tests:
          - not_null

      - name: cell_lon
        description: "Centroid longitude"
        tests:
          - not_null

      - name: geom
        description: "PostGIS POINT geometry (SRID 4326)"
        tests:
          - not_null

      - name: risk_score
        description: >
          Seasonal composite collision risk (0–1). Same 7-sub-score
          formula as fct_collision_risk with percentile ranks computed
          within each season.
        tests:
          - not_null

      - name: risk_category
        description: "Risk bucket: critical/high/medium/low/minimal"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['critical', 'high', 'medium', 'low', 'minimal']

      - name: traffic_score
        description: "Seasonal traffic threat sub-score (0–1), weight 25%"
        tests:
          - not_null

      - name: cetacean_score
        description: "Seasonal cetacean exposure sub-score (0–1), weight 25%"
        tests:
          - not_null

      - name: proximity_score
        description: "Proximity sub-score (0–1), weight 15% — static across seasons"
        tests:
          - not_null

      - name: strike_score
        description: "Strike history sub-score (0–1), weight 10% — static across seasons"
        tests:
          - not_null

      - name: habitat_score
        description: "Habitat suitability sub-score (0–1), weight 10% — static across seasons"
        tests:
          - not_null

      - name: protection_gap
        description: "Protection gap sub-score (0–1), weight 10% — seasonal speed zones"
        tests:
          - not_null

      - name: reference_risk_score
        description: "Nisi reference risk sub-score (0–1), weight 5% — static"

      - name: has_traffic
        description: "True if vessel traffic exists in this cell-season"

      - name: has_whale_sightings
        description: "True if cetacean sightings exist in this cell-season"

      - name: in_mpa
        description: "True if cell is within any MPA"

      - name: has_strike_history
        description: "True if historical strikes in this cell"

      - name: in_speed_zone
        description: "True if an active speed zone covers this cell in this season"

      - name: in_current_sma
        description: "True if an active SMA covers this cell in this season"

      - name: in_proposed_zone
        description: "True if a proposed zone covers this cell in this season"

      - name: has_nisi_reference
        description: "True if Nisi reference data matched to this cell"

    tests:
      - unique:
          column_name: "h3_cell || '-' || season"

  # ── Whale SDM Seasonal ──────────────────────────────────
  - name: fct_whale_sdm_seasonal
    description: >
      Seasonal species distribution model training set. One row per
      (h3_cell, season) with a binary whale_present target that varies
      by season, plus per-species presence targets for 6 key taxa
      (right whale, humpback, fin, blue, sperm, minke). Includes
      environmental and spatial features. Traffic features are
      intentionally EXCLUDED to avoid detection bias. Ocean covariates
      are seasonal (climatological means). Nisi per-species risk scores
      included for 4 species (validation benchmarks). Land cells excluded.
      ~7.3M rows.
    config:
      indexes:
        - columns: ['h3_cell', 'season']
        - columns: ['geom']
          type: gist
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: season
        description: "Season name: winter, spring, summer, fall"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winter', 'spring', 'summer', 'fall']

      - name: whale_present
        description: "Binary target: 1 = cetacean sighted in this cell-season, 0 = no sightings"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]

      - name: total_sightings
        description: "Total sightings in this cell-season (0 for absence cells)"

      - name: unique_species
        description: "Distinct species observed in this cell-season"

      - name: baleen_whale_sightings
        description: "Baleen whale sightings in this cell-season"

      - name: recent_sightings
        description: "Sightings from 2019+ in this cell-season"

      - name: right_whale_present
        description: "Binary target: 1 = North Atlantic right whale sighted in this cell-season"

      - name: humpback_present
        description: "Binary target: 1 = humpback whale sighted in this cell-season"

      - name: fin_whale_present
        description: "Binary target: 1 = fin whale sighted in this cell-season"

      - name: blue_whale_present
        description: "Binary target: 1 = blue whale sighted in this cell-season"

      - name: sperm_whale_present
        description: "Binary target: 1 = sperm whale sighted in this cell-season"

      - name: minke_whale_present
        description: "Binary target: 1 = minke whale sighted in this cell-season"

      - name: nisi_blue_risk
        description: "Nisi et al. blue whale species-specific risk score (validation benchmark)"

      - name: nisi_fin_risk
        description: "Nisi et al. fin whale species-specific risk score (validation benchmark)"

      - name: nisi_humpback_risk
        description: "Nisi et al. humpback whale species-specific risk score (validation benchmark)"

      - name: nisi_sperm_risk
        description: "Nisi et al. sperm whale species-specific risk score (validation benchmark)"

      - name: sst
        description: "Sea surface temperature (°C) — static across seasons"

      - name: sst_sd
        description: "SST standard deviation (°C)"

      - name: mld
        description: "Mixed layer depth (m)"

      - name: sla
        description: "Sea level anomaly (m)"

      - name: pp_upper_200m
        description: "Primary production in upper 200m (mg C m⁻² day⁻¹)"

      - name: depth_m
        description: "Mean ocean depth (m)"

      - name: is_continental_shelf
        description: "True if cell is on the continental shelf"

      - name: depth_zone
        description: "Categorical: shelf / slope / abyssal"

      - name: in_speed_zone
        description: "True if an active speed zone covers this cell in this season"

      - name: in_current_sma
        description: "True if an active SMA covers this cell in this season"

    tests:
      - unique:
          column_name: "h3_cell || '-' || season"
  # ── ML-Enhanced Collision Risk ──────────────────────────
  - name: fct_collision_risk_ml
    description: >
      ML-enhanced seasonal collision risk per H3 cell. Same 7-sub-score
      architecture as fct_collision_risk_seasonal but replaces the raw-sighting
      cetacean sub-score with ML-predicted whale presence probabilities from
      ISDM models (int_ml_whale_predictions). The whale_ml_score uses three
      composites: any_whale_prob (50%), max_whale_prob (30%), mean_whale_prob
      (20%). Also computes a whale×traffic interaction metric. Percentile
      ranking is done WITHIN each season. Land cells excluded. ~7.3M rows.
    config:
      indexes:
        - columns: ['h3_cell', 'season']
        - columns: ['risk_score']
        - columns: ['geom']
          type: gist
    columns:
      - name: h3_cell
        description: "H3 cell index (resolution 7)"
        tests:
          - not_null

      - name: season
        description: "Season name: winter, spring, summer, fall"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winter', 'spring', 'summer', 'fall']

      - name: cell_lat
        description: "Centroid latitude"
        tests:
          - not_null

      - name: cell_lon
        description: "Centroid longitude"
        tests:
          - not_null

      - name: geom
        description: "PostGIS POINT geometry (SRID 4326)"
        tests:
          - not_null

      - name: risk_score
        description: >
          ML-enhanced composite collision risk (0–1). Interaction-first:
          P(whale) × traffic threat (25%), residual traffic (15%), whale (10%),
          plus proximity, strike, habitat, protection, reference.
        tests:
          - not_null

      - name: risk_category
        description: "Risk bucket: critical/high/medium/low/minimal"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['critical', 'high', 'medium', 'low', 'minimal']

      - name: interaction_score
        description: >
          Whale×traffic interaction sub-score (0–1), weight 25%. Percentile-ranked
          P(any whale) × traffic_threat. Primary co-occurrence metric following
          Rockwood et al. (2021) encounter rate model.
        tests:
          - not_null

      - name: traffic_score
        description: >
          Traffic threat sub-score (0–1), weight 15%. Uses V&T (2007) speed-lethality
          logistic and vessel draft instead of binary >10kn threshold.
        tests:
          - not_null

      - name: whale_ml_score
        description: >
          Residual ML whale exposure sub-score (0–1), weight 10%. ISDM-predicted
          whale presence independent of traffic co-occurrence.
        tests:
          - not_null

      - name: proximity_score
        description: "Proximity sub-score (0–1), weight 15%"
        tests:
          - not_null

      - name: strike_score
        description: "Strike history sub-score (0–1), weight 10%"
        tests:
          - not_null

      - name: habitat_score
        description: "Habitat suitability sub-score (0–1), weight 10%"
        tests:
          - not_null

      - name: protection_gap
        description: "Protection gap sub-score (0–1), weight 10%"
        tests:
          - not_null

      - name: reference_risk_score
        description: "Nisi reference risk sub-score (0–1), weight 5%"
        tests:
          - not_null

      - name: isdm_blue_whale
        description: "ISDM predicted P(blue whale present) (0–1)"

      - name: isdm_fin_whale
        description: "ISDM predicted P(fin whale present) (0–1)"

      - name: isdm_humpback_whale
        description: "ISDM predicted P(humpback whale present) (0–1)"

      - name: isdm_sperm_whale
        description: "ISDM predicted P(sperm whale present) (0–1)"

      - name: any_whale_prob
        description: "P(any whale present) = 1 - ∏(1 - P_i)"

      - name: max_whale_prob
        description: "Highest P(present) across 4 species"

      - name: mean_whale_prob
        description: "Average P(present) across 4 species"

      - name: whale_traffic_interaction
        description: >
          Diagnostic: P(any whale) × traffic_score. Key co-occurrence
          metric — high values indicate cells where whales and heavy
          traffic overlap. Not part of the composite weights.

      - name: has_traffic
        description: "True if seasonal vessel traffic data exists for this cell"

      - name: has_ml_predictions
        description: "True if ISDM predictions exist for this cell"

      - name: in_mpa
        description: "True if any MPA polygon overlaps this cell"

      - name: has_strike_history
        description: "True if a historical ship strike occurred in this cell"

      - name: in_speed_zone
        description: "True if a speed zone is active in this cell-season"

      - name: in_current_sma
        description: "True if an active SMA covers this cell in this season"

      - name: in_proposed_zone
        description: "True if a proposed speed zone covers this cell"

      - name: has_nisi_reference
        description: "True if Nisi reference risk data exists for this cell"

    tests:
      - unique:
          column_name: "h3_cell || '-' || season"
